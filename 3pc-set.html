<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 Piece Sets | Phanix Garments</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial,sans-serif;
    color:white;
}

.header{
    background:#111;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #d4af37;
}

.header h1{
    color:#d4af37;
    margin:0;
}

.home-btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    border-color:#d4af37;
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    color:#d4af37;
    padding:15px;
    margin:0;
}
</style>
</head>

<body>

<div class="header">
    <h1>3 Piece Sets Collection</h1>
    <a href="index.html" class="home-btn">Back To Home</a>
</div>

<div class="products">

<div class="card">
  <img src="ALIA-1.jpg">
  <h3>ALIA-1</h3>
</div>

<div class="card">
  <img src="ALIA-2.jpg">
  <h3>ALIA-2</h3>
</div>

<div class="card">
  <img src="ANOKHI-1.jpg">
  <h3>ANOKHI-1</h3>
</div>

<div class="card">
  <img src="ANSHIKA-1.jpg">
  <h3>ANSHIKA-1</h3>
</div>

<div class="card">
  <img src="ANSHIKA-2.jpg">
  <h3>ANSHIKA-2</h3>
</div>

<div class="card">
  <img src="KAJAL.jpeg">
  <h3>KAJAL</h3>
</div>

</div>

</body>
</html>
